name: Deploy a Hostinger (Manual)

# Solo se ejecuta cuando tú lo disparas manualmente desde GitHub Actions
on:
  workflow_dispatch:
    inputs:
      confirmacion:
        description: 'Escribe "deploy" para confirmar el despliegue'
        required: true
        default: ''

jobs:
  deploy:
    name: Subir archivos via FTP
    runs-on: ubuntu-latest

    # Validar que el usuario escribió "deploy" antes de proceder
    if: github.event.inputs.confirmacion == 'deploy'

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Deploy via FTP a Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 31.170.160.178
          username: telemetry
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./
          server-dir: /public_html/
          # NO borrar archivos en el servidor que no estén en el repo
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/README.md
            **/.gitignore
            **/.DS_Store
            **/.github/**
